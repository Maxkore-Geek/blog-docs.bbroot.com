<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 博客备份系统 · 归档站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0f0f0f;
            color: #e0e0e0;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        header { margin-bottom: 40px; }
        h1 { font-size: 3rem; color: #00ff80; }
        .subtitle { color: #888; margin-bottom: 20px; }
        .backup-info {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .backup-time { color: #00ff80; font-size: 1.2rem; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5rem;
            color: #00ff80;
            font-weight: bold;
        }
        .stat-label { color: #888; margin-top: 10px; }
        .backup-list {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 30px 0;
        }
        .backup-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #333;
        }
        .backup-item:last-child { border-bottom: none; }
        .backup-name { color: #00ff80; }
        .backup-date { color: #888; font-size: 0.9rem; }
        .backup-size { color: #666; font-size: 0.9rem; }
        .download-btn {
            background: transparent;
            border: 1px solid #00ff80;
            color: #00ff80;
            padding: 5px 15px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .download-btn:hover {
            background: #00ff80;
            color: #0f0f0f;
        }
        .backup-script {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 30px 0;
        }
        pre {
            background: #0f0f0f;
            padding: 15px;
            border-radius: 4px;
            color: #00ff80;
            overflow-x: auto;
        }
        footer {
            margin-top: 60px;
            text-align: center;
            color: #666;
            padding: 20px;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 博客备份系统</h1>
            <div class="subtitle">自动备份 · 版本管理 · 一键恢复</div>
        </header>

        <div class="backup-info" id="backupInfo">
            <div class="backup-time">⏱️ 正在加载备份信息...</div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number">-</div>
                <div class="stat-label">总备份数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">-</div>
                <div class="stat-label">总大小 (MB)</div>
            </div>
        </div>

        <div class="backup-list">
            <h2 style="margin-bottom: 20px; color: #00ff80;">📋 最近备份</h2>
            <div id="backupItems">
                <!-- 备份列表会动态加载到这里 -->
                <div style="color: #888; text-align: center; padding: 20px;">加载中...</div>
            </div>
        </div>

        <div class="backup-script">
            <h2 style="margin-bottom: 20px; color: #00ff80;">🤖 自动备份脚本</h2>
            <p style="color: #888; margin-bottom: 10px;">每日凌晨 3 点自动执行：</p>
            <pre>
#!/bin/bash
# 博客自动备份脚本
cd /e/blog-docs.bbroot.com
./backup.sh</pre>
        </div>

        <footer>
            <p>© 2026 Maxkore · 备份系统 · 文件可直接下载</p>
            <p style="margin-top: 10px;">
                <a href="https://maxkore.bbroot.com" style="color: #666; text-decoration: none;">← 返回主博客</a>
            </p>
        </footer>
    </div>

    <script>
        // 动态加载备份文件列表
        async function loadBackups() {
            try {
                // 这里需要后端 API 或预先生成的文件列表
                // 目前先用静态示例
                const backups = [
                    { name: 'posts_2026-02-25.tar.gz', date: '2026-02-25 15:30', size: '1.2 MB' },
                    { name: 'posts_2026-02-24.tar.gz', date: '2026-02-24 15:30', size: '1.1 MB' },
                    { name: 'config_2026-02-25.yml', date: '2026-02-25 15:30', size: '2 KB' },
                    { name: 'images_2026-02-25.tar.gz', date: '2026-02-25 15:30', size: '3.5 MB' }
                ];

                const container = document.getElementById('backupItems');
                container.innerHTML = backups.map(b => `
                    <div class="backup-item">
                        <div>
                            <div class="backup-name">${b.name}</div>
                            <div class="backup-date">${b.date}</div>
                        </div>
                        <div class="backup-size">${b.size}</div>
                        <a href="/backups/${b.name}" class="download-btn" download>下载</a>
                    </div>
                `).join('');

                document.getElementById('backupInfo').innerHTML = `
                    <div class="backup-time">⏱️ 上次备份: 2026-02-25 15:30:00</div>
                    <div style="color: #00ff80; margin-top: 10px;">✅ 备份状态: 正常</div>
                `;

                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${backups.length}</div>
                        <div class="stat-label">总备份数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">5.9</div>
                        <div class="stat-label">总大小 (MB)</div>
                    </div>
                `;
            } catch (error) {
                console.error('加载备份失败:', error);
            }
        }

        // 页面加载时运行
        loadBackups();
    </script>
</body>
</html>
