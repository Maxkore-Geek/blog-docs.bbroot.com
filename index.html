<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 博客备份 · 归档站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            background: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 3rem; color: #888; margin-bottom: 10px; }
        .subtitle { color: #666; }
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        .archive-card {
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        .archive-card:hover { border-color: #888; }
        .archive-year { font-size: 2rem; color: #888; margin-bottom: 10px; }
        .archive-count { color: #666; font-size: 0.9rem; }
        .post-list { margin-top: 15px; }
        .post-item {
            padding: 8px 0;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            color: #aaa;
        }
        .post-date { color: #666; font-size: 0.8rem; }
        .warning {
            background: #332a1a;
            border: 1px solid #665533;
            border-radius: 8px;
            padding: 20px;
            margin: 30px 0;
            color: #ccaa66;
        }
        footer {
            margin-top: 60px;
            text-align: center;
            color: #666;
            border-top: 1px solid #333;
            padding-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 博客备份 · 归档站</h1>
            <div class="subtitle">旧文章 · 草稿 · 历史版本</div>
        </header>

        <div class="warning">
            ⚠️ 本站点为博客备份归档，内容可能非最新、不完整，仅供参考。
        </div>

        <div class="archive-grid">
            <div class="archive-card">
                <div class="archive-year">2026</div>
                <div class="archive-count">3 篇文章</div>
                <div class="post-list">
                    <div class="post-item">
                        <span>Hexo 博客完全操作手册</span>
                        <span class="post-date">2026-02-23</span>
                    </div>
                    <div class="post-item">
                        <span>从零开始搭建个人博客</span>
                        <span class="post-date">2026-02-23</span>
                    </div>
                    <div class="post-item">
                        <span>博客维护说明书</span>
                        <span class="post-date">2026-02-23</span>
                    </div>
                </div>
            </div>

            <div class="archive-card">
                <div class="archive-year">草稿箱</div>
                <div class="archive-count">2 篇未完成</div>
                <div class="post-list">
                    <div class="post-item">
                        <span>Docker 入门指南（草稿）</span>
                        <span class="post-date">进行中</span>
                    </div>
                    <div class="post-item">
                        <span>Git 进阶技巧（草稿）</span>
                        <span class="post-date">待续</span>
                    </div>
                </div>
            </div>

            <div class="archive-card">
                <div class="archive-year">历史版本</div>
                <div class="archive-count">5 个版本</div>
                <div class="post-list">
                    <div class="post-item">
                        <span>Hexo 手册 v1.0</span>
                        <span class="post-date">2026-02-20</span>
                    </div>
                    <div class="post-item">
                        <span>Hexo 手册 v2.0</span>
                        <span class="post-date">2026-02-23</span>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 Maxkore · 博客备份归档 · 数据仅供参考</p>
            <p style="margin-top: 10px; font-size: 0.9rem;">
                <a href="https://maxkore.bbroot.com" style="color: #666; text-decoration: none;">← 返回主博客</a>
            </p>
        </footer>
    </div>
</body>
</html>
